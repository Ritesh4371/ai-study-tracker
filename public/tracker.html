        // ==================== UTILITIES ====================
        
        // Calculate streak with proper logic
        function calculateGlobalStreak(completions) {
            if (completions.length === 0) return { currentStreak: 0, maxStreak: 0 };

            const dates = [...new Set(completions.map(c => c.completion_date))]
                .sort((a, b) => new Date(b) - new Date(a));

            let currentStreak = 0;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            let expected = new Date(today);

            for (const dateStr of dates) {
                const date = new Date(dateStr);
                date.setHours(0, 0, 0, 0);
                
                if (date.getTime() === expected.getTime()) {
                    currentStreak++;
                    expected.setDate(expected.getDate() - 1);
                } else if (date < expected) {
                    break;
                }
            }

            let maxStreak = 0;
            let tempStreak = 1;
            
            for (let i = 0; i < dates.length - 1; i++) {
                const current = new Date(dates[i]);
                const next = new Date(dates[i + 1]);
                current.setHours(0, 0, 0, 0);
                next.setHours(0, 0, 0, 0);
                
                const diffDays = Math.round((current - next) / (1000 * 60 * 60 * 24));
                
                if (diffDays === 1) {
                    tempStreak++;
                } else {
                    maxStreak = Math.max(maxStreak, tempStreak);
                    tempStreak = 1;
                }
            }
            maxStreak = Math.max(maxStreak, tempStreak);

            return { currentStreak, maxStreak };
        }

        // Smart queue algorithm
        function calculateSmartQueue(completions, preferences, lastSection) {
            const today = new Date().toISOString().split('T')[0];
            const queueSize = preferences.queueSize || 15;
            
            // Get completion dates for each task
            const taskCompletionMap = {};
            completions.forEach(c => {
                if (!taskCompletionMap[c.task_id]) {
                    taskCompletionMap[c.task_id] = [];
                }
                taskCompletionMap[c.task_id].push(c.completion_date);
            });

            // Filter out completed tasks for today
            const availableTasks = ALL_ITEMS.filter(task => {
                const completedToday = completions.some(
                    c => c.task_id === task.id && c.completion_date === today
                );
                return !completedToday;
            });

            // Score each task
            const scoredTasks = availableTasks.map(task => {
                let score = 0;
                
                // Priority weight
                if (task.priority === 'high') score += 100;
                else if (task.priority === 'medium') score += 50;
                else score += 25;
                
                // Section continuity
                if (lastSection && task.section === lastSection) {
                    score += 30;
                }
                
                // Recency - tasks not studied recently get boosted
                const lastCompletionDate = taskCompletionMap[task.id] 
                    ? Math.max(...taskCompletionMap[task.id].map(d => new Date(d).getTime()))
                    : 0;
                
                if (lastCompletionDate) {
                    const daysSince = (Date.now() - lastCompletionDate) / (1000 * 60 * 60 * 24);
                    score += Math.min(daysSince * 2, 40); // Max 40 points for recency
                }
                
                return { task, score };
            });

            // Sort by score
            scoredTasks.sort((a, b) => b.score - a.score);

            // Ensure priority distribution
            const high = scoredTasks.filter(st => st.task.priority === 'high').slice(0, 5);
            const medium = scoredTasks.filter(st => st.task.priority === 'medium').slice(0, 5);
            const low = scoredTasks.filter(st => st.task.priority === 'low').slice(0, 5);

            // Combine and take top queueSize
            const queue = [...high, ...medium, ...low]
                .sort((a, b) => b.score - a.score)
                .slice(0, queueSize)
                .map(st => st.task.id);

            return queue;
        }

        // Adaptive goals
        function adjustGoals(goals, todayCount) {
            const history = goals.history || [];
            history.push(todayCount);
            
            // Keep last 7 days
            if (history.length > 7) {
                history.shift();
            }
            
            // Adjust if we have enough history
            if (history.length >= 3) {
                const avg = history.reduce((a, b) => a + b, 0) / history.length;
                
                if (avg > goals.daily * 1.5) {
                    // Consistently exceeding - increase goal
                    goals.daily = Math.min(goals.daily + 1, 15);
                } else if (avg < goals.daily * 0.6 && goals.daily > 3) {
                    // Consistently failing - decrease goal
                    goals.daily = Math.max(goals.daily - 1, 3);
                }
            }
            
            goals.history = history;
            return goals;
        }

                const weeks = [];

                for (let i = 0; i < startDay; i++) {

                }

                let weekIndex = 0;
                let lastMonth = -1;

        function StudyTimer({ taskId, taskName, onComplete }) {
            const [isRunning, setIsRunning] = useState(false);
            const [seconds, setSeconds] = useState(0);
            const intervalRef = useRef(null);

            useEffect(() => {
                if (isRunning) {
                    intervalRef.current = setInterval(() => {
                        setSeconds(s => s + 1);
                    }, 1000);
                } else {
                    if (intervalRef.current) {
                        clearInterval(intervalRef.current);
                    }
                }

                return () => {
                    if (intervalRef.current) {
                        clearInterval(intervalRef.current);
                    }
                };
            }, [isRunning]);

            const handleStart = () => {
                setIsRunning(true);
            };

            const handleStop = () => {
                setIsRunning(false);
                if (seconds > 0) {
                    onComplete(Math.floor(seconds / 60));
                    setSeconds(0);
                }
            };

            const formatTime = (secs) => {
                const hours = Math.floor(secs / 3600);
                const mins = Math.floor((secs % 3600) / 60);
                const s = secs % 60;
                return `${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };

            return (
                <div className="flex items-center gap-2 mt-2">
                    <div className={`text-xs font-mono text-gray-700 dark:text-gray-300 ${isRunning ? 'timer-active' : ''}`}>
                        ⏱️ {formatTime(seconds)}
                    </div>
                    {!isRunning ? (
                        <button
                            onClick={handleStart}
                            className="text-xs px-2 py-1 bg-green-500 text-white rounded hover:bg-green-600"
                        >
                            Start
                        </button>
                    ) : (
                        <button
                            onClick={handleStop}
                            className="text-xs px-2 py-1 bg-red-500 text-white rounded hover:bg-red-600"
                        >
                            Stop
                        </button>
                    )}
                </div>
            );
        }

                <div className={`task-card bg-white dark:bg-gray-800 rounded-lg shadow p-4 mb-3 border-l-4 ${
                    isCompletedToday 
                        ? 'border-green-500' 
                        : task.priority 
                            ? priorityColors[task.priority]
                            : 'border-gray-200 dark:border-gray-700'
                }`}>
                    <div className="flex items-start gap-3">
                        <input
                            type="checkbox"
                            checked={isCompletedToday}
                            onChange={() => onToggle(task.id, today, isCompletedToday)}
                            className="mt-1 w-5 h-5 text-green-600 rounded focus:ring-2 focus:ring-green-500 cursor-pointer flex-shrink-0"
                        />
                        <div className="flex-1 min-w-0">
                            <div className="flex items-start justify-between gap-2">
                                <h3 className={`font-medium flex-1 ${isCompletedToday ? 'line-through text-gray-500 dark:text-gray-600' : 'text-gray-900 dark:text-gray-100'}`}>
                                    {task.name}
                                </h3>
                                <div className="flex items-center gap-2 flex-shrink-0">
                                    {isCompletedToday && todayCompletion.completed_at && (
                                        <span className="text-[10px] text-green-600 dark:text-green-400 font-medium">
                                            ✓ {formatTimestamp(todayCompletion.completed_at)}
                                        </span>
                                    )}
                                    {task.priority && !isCompletedToday && (
                                        <span className={`text-[10px] px-2 py-0.5 rounded-full font-medium whitespace-nowrap ${priorityBadges[task.priority]}`}>
                                            {task.priority}
                                        </span>
                                    )}
                                </div>
                            </div>
                            <div className="mt-2 flex flex-wrap gap-2 text-sm">
                                <span className="text-blue-600 dark:text-blue-400 font-medium">
                                    ⏱️ {task.time}h
                                </span>
                                {task.section !== 'Projects' && (
                                    <span className="text-gray-500 dark:text-gray-400 text-xs">
                                        📚 {task.section}
                                    </span>
                                )}
                            </div>

                            {/* Timer */}
                            {showTimer && !isCompletedToday && (
                                <StudyTimer
                                    taskId={task.id}
                                    taskName={task.name}
                                    onComplete={(minutes) => onTimerComplete(task.id, minutes)}
                                />
                            )}

                            {/* Note section */}
                            {(notes[task.id] || showNoteInput) && (
                                <div className="mt-2 text-sm">
                                    {showNoteInput ? (
                                        <div className="flex gap-2">
                                            <input
                                                type="text"
                                                value={noteText}
                                                onChange={(e) => setNoteText(e.target.value)}
                                                placeholder="Add a note..."
                                                className="flex-1 px-2 py-1 text-xs border dark:border-gray-600 rounded bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100"
                                                onKeyDown={(e) => e.key === 'Enter' && handleSaveNote()}
                                            />
                                            <button
                                                onClick={handleSaveNote}
                                                className="text-xs px-2 py-1 bg-blue-500 text-white rounded hover:bg-blue-600"
                                            >
                                                Save
                                            </button>
                                        </div>
                                    ) : (
                                        <div className="text-xs text-gray-600 dark:text-gray-400 bg-gray-50 dark:bg-gray-700/50 p-2 rounded">
                                            📝 {notes[task.id]}
                                        </div>
                                    )}
                                </div>
                            )}

                            {!showNoteInput && !notes[task.id] && (
                                <button
                                    onClick={() => setShowNoteInput(true)}
                                    className="mt-2 text-xs text-gray-500 hover:text-blue-600 dark:hover:text-blue-400"
                                >
                                    + Add note
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        });

        // ==================== KEYBOARD SHORTCUTS HELP ====================
        function ShortcutsHelp({ show, onClose }) {
            if (!show) return null;

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50" onClick={onClose}>
                    <div className="bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-md w-full p-6" onClick={e => e.stopPropagation()}>
                        <h2 className="text-xl font-bold text-gray-900 dark:text-gray-100 mb-4">
                            ⌨️ Keyboard Shortcuts
                        </h2>
                        <div className="space-y-2 text-sm">
                            <div className="flex justify-between">
                                <span className="text-gray-600 dark:text-gray-400">Toggle dark mode</span>
                                <kbd className="kbd">D</kbd>
                            </div>
                            <div className="flex justify-between">
                                <span className="text-gray-600 dark:text-gray-400">Focus search</span>
                                <kbd className="kbd">/</kbd>
                            </div>
                            <div className="flex justify-between">
                                <span className="text-gray-600 dark:text-gray-400">Toggle focus mode</span>
                                <kbd className="kbd">F</kbd>
                            </div>
                            <div className="flex justify-between">
                                <span className="text-gray-600 dark:text-gray-400">Export data</span>
                                <kbd className="kbd">E</kbd>
                            </div>
                            <div className="flex justify-between">
                                <span className="text-gray-600 dark:text-gray-400">Import data</span>
                                <kbd className="kbd">I</kbd>
                            </div>
                            <div className="flex justify-between">
                                <span className="text-gray-600 dark:text-gray-400">Show help</span>
                                <kbd className="kbd">?</kbd>
                            </div>
                            <div className="flex justify-between">
                                <span className="text-gray-600 dark:text-gray-400">Close modal</span>
                                <kbd className="kbd">ESC</kbd>
                            </div>
                        </div>
                        <button
                            onClick={onClose}
                            className="mt-4 w-full bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-800 dark:text-gray-200 font-medium py-2 px-4 rounded"
                        >
                            Close
                        </button>
                    </div>
                </div>
            );
        }

        // ==================== MAIN APP ====================
        function App() {
            // Initialize with data from localStorage immediately (synchronous)
            const [completions, setCompletions] = useState(() => {
                const data = StorageManager.getCompletions();
                console.log('Initial load - Completions:', data.length);
                return data;
            });
            const [notes, setNotes] = useState(() => {
                const data = StorageManager.getNotes();
                console.log('Initial load - Notes:', Object.keys(data).length);
                return data;
            });
            const [goals, setGoals] = useState(() => {
                const data = StorageManager.getGoals();
                console.log('Initial load - Goals:', data);
                return data;
            });
            const [dailyStats, setDailyStats] = useState(() => {
                const data = StorageManager.getDailyStats();
                console.log('Initial load - Daily stats entries:', Object.keys(data).length);
                return data;
            });
            const [loading, setLoading] = useState(false);
            const [filterSection, setFilterSection] = useState('all');
            const [searchQuery, setSearchQuery] = useState('');
            const [darkMode, setDarkMode] = useState(() => {
                const data = StorageManager.getDarkMode();
                console.log('Initial load - Dark mode:', data);
                return data;
            });
            const [preferences, setPreferences] = useState(() => {
                const data = StorageManager.getPreferences();
                console.log('Initial load - Preferences:', data);
                return data;
            });
            const [focusMode, setFocusMode] = useState(false);
            const [showShortcuts, setShowShortcuts] = useState(false);
            const [visibleQueue, setVisibleQueue] = useState(() => {
                const data = StorageManager.getQueueState();
                console.log('Initial load - Queue:', data.visibleTasks?.length || 0);
                return data.visibleTasks || [];
            });
            const [lastSection, setLastSection] = useState(() => {
                const data = StorageManager.getLastSection();
                console.log('Initial load - Last section:', data);
                return data;
            });

            const [lastBackup, setLastBackup] = useState(() => {
                const data = StorageManager.getLastBackup();
                console.log('Initial load - Last backup:', data);
                return data;
            });

            const searchInputRef = useRef(null);

            // Apply dark mode on mount
            useEffect(() => {
                if (darkMode) {
                    document.body.classList.add('dark');
                }
                console.log('✅ App mounted with persistent data');
            }, []);

            // Update visible queue when needed
            useEffect(() => {
                if (!loading) {
                    const newQueue = calculateSmartQueue(completions, preferences, lastSection);
                    setVisibleQueue(newQueue);
                    StorageManager.saveQueueState({ visibleTasks: newQueue });
                }
            }, [completions, preferences, lastSection, loading]);

            // Keyboard shortcuts
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                        if (e.key === 'Escape') {
                            e.target.blur();
                        }
                        return;
                    }

                    switch(e.key.toLowerCase()) {
                        case 'd':
                            toggleDarkMode();
                            break;
                        case '/':
                            e.preventDefault();
                            searchInputRef.current?.focus();
                            break;
                        case 'f':
                            setFocusMode(f => !f);
                            break;
                        case 'e':
                            handleExport();
                            break;
                        case 'i':
                            handleImportClick();
                            break;
                        case '?':
                            setShowShortcuts(true);
                            break;
                        case 'escape':
                            setShowShortcuts(false);
                            setFocusMode(false);
                            break;
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [darkMode, handleImportClick]);

            // Auto-export on tab close/reload (best-effort)
            useEffect(() => {
                window.addEventListener('beforeunload', autoExportOnUnload);
                return () => window.removeEventListener('beforeunload', autoExportOnUnload);
            }, [autoExportOnUnload]);

            // Handlers
            const handleToggle = useCallback((taskId, date, isCompleted) => {
                console.log('Toggle task:', taskId, 'Date:', date, 'Current state:', isCompleted);
                
                let newCompletions;
                if (isCompleted) {
                    newCompletions = completions.filter(
                        c => !(c.task_id === taskId && c.completion_date === date)
                    );
                    console.log('Unchecking task - New count:', newCompletions.length);
                } else {
                    const now = new Date();
                    newCompletions = [...completions, {
                        id: `${taskId}-${date}-${Date.now()}`,
                        task_id: taskId,
                        completion_date: date,
                        actual_minutes: 0,
                        completed_at: now.toISOString() // Add timestamp
                    }];
                    console.log('Checking task - New count:', newCompletions.length);

                    // Update last section for continuity
                    const task = ALL_ITEMS.find(t => t.id === taskId);
                    if (task) {
                        setLastSection(task.section);
                        StorageManager.saveLastSection(task.section);
                    }

                    // Update daily stats
                    const newDailyStats = { ...dailyStats };
                    newDailyStats[date] = {
                        ...newDailyStats[date],
                        tasks_completed: (newDailyStats[date]?.tasks_completed || 0) + 1,
                        study_minutes: newDailyStats[date]?.study_minutes || 0
                    };
                    setDailyStats(newDailyStats);
                    StorageManager.saveDailyStats(newDailyStats);
                    console.log('Updated daily stats for', date);

                    // Adjust goals adaptively
                    const todayCount = newCompletions.filter(c => c.completion_date === date).length;
                    const adjustedGoals = adjustGoals({ ...goals }, todayCount);
                    setGoals(adjustedGoals);
                    StorageManager.saveGoals(adjustedGoals);
                }
                
                // Save completions to localStorage
                StorageManager.saveCompletions(newCompletions);
                console.log('✅ Saved to localStorage - Total completions:', newCompletions.length);
                
                // Update state
                setCompletions(newCompletions);
            }, [completions, dailyStats, goals, lastSection]);

            const handleAddNote = useCallback((taskId, note) => {
                const newNotes = { ...notes, [taskId]: note };
                StorageManager.saveNotes(newNotes);
                setNotes(newNotes);
            }, [notes]);

            const handleUpdateGoals = useCallback((newGoals) => {
                StorageManager.saveGoals(newGoals);
                setGoals(newGoals);
            }, []);

            const handleTimerComplete = useCallback((taskId, minutes) => {
                const today = new Date().toISOString().split('T')[0];
                
                // Update completion with actual time
                const newCompletions = completions.map(c => {
                    if (c.task_id === taskId && c.completion_date === today) {
                        return { ...c, actual_minutes: (c.actual_minutes || 0) + minutes };
                    }
                    return c;
                });
                setCompletions(newCompletions);
                StorageManager.saveCompletions(newCompletions);

                // Update daily stats
                const newDailyStats = { ...dailyStats };
                newDailyStats[today] = {
                    ...newDailyStats[today],
                    tasks_completed: newDailyStats[today]?.tasks_completed || 0,
                    study_minutes: (newDailyStats[today]?.study_minutes || 0) + minutes
                };
                setDailyStats(newDailyStats);
                StorageManager.saveDailyStats(newDailyStats);
            }, [completions, dailyStats]);

            const toggleDarkMode = useCallback(() => {
                const newDarkMode = !darkMode;
                setDarkMode(newDarkMode);
                StorageManager.saveDarkMode(newDarkMode);
                document.body.classList.toggle('dark');
            }, [darkMode]);

            const fileInputRef = useRef(null);

            const handleExport = useCallback(() => {
                const data = StorageManager.exportData();
                const now = new Date().toISOString();
                downloadJSON(data, `ai-study-tracker-${now.split('T')[0]}.json`);

                StorageManager.saveLastBackup(now);
                setLastBackup(now);
            }, []);

            const handleImportClick = useCallback(() => {
                fileInputRef.current?.click();
            }, []);

            const handleFileImport = useCallback((event) => {
                const file = event.target.files?.[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = () => {
                    try {
                        const data = JSON.parse(reader.result);
                        StorageManager.importData(data);

                        // Reload state from storage to ensure UI reflects the imported data
                        setCompletions(StorageManager.getCompletions());
                        setNotes(StorageManager.getNotes());
                        setGoals(StorageManager.getGoals());
                        setDailyStats(StorageManager.getDailyStats());
                        setPreferences(StorageManager.getPreferences());
                        setVisibleQueue(StorageManager.getQueueState().visibleTasks || []);

                        console.log('✅ Imported data from file:', file.name);
                    } catch (err) {
                        console.error('Failed to import data:', err);
                        alert('Failed to import data. Please ensure it is a valid export file.');
                    }
                };
                reader.readAsText(file);

                // Reset the input so the same file can be selected again if needed
                event.target.value = '';
            }, []);

            const autoExportOnUnload = useCallback((event) => {
                try {
                    const data = StorageManager.exportData();
                    const now = new Date().toISOString();
                    const filename = `ai-study-tracker-autosave-${now.split('T')[0]}.json`;
                    downloadJSON(data, filename);

                    StorageManager.saveLastBackup(now);
                    setLastBackup(now);
                } catch (error) {
                    console.warn('Auto-export on unload failed:', error);
                }

                // Some browsers show a confirmation prompt when setting returnValue.
                // This can help prevent accidental data loss in case localStorage is cleared.
                event.preventDefault();
                event.returnValue = '';
            }, []);

            const updatePreferences = useCallback((newPrefs) => {
                const updated = { ...preferences, ...newPrefs };
                setPreferences(updated);
                StorageManager.savePreferences(updated);
            }, [preferences]);

            const handleSectionClick = useCallback((section) => {
                setFilterSection(section);
            }, []);

            // Computed values
            const sections = useMemo(() => {
                const sectionSet = new Set(ALL_ITEMS.map(t => t.section));
                return ['all', ...Array.from(sectionSet).sort((a, b) => {
                    if (a === 'Projects') return 1;
                    if (b === 'Projects') return -1;
                    const aNum = parseInt(a.split('.')[0]);
                    const bNum = parseInt(b.split('.')[0]);
                    return aNum - bNum;
                })];
            }, []);

            const filteredTasks = useMemo(() => {
                const today = new Date().toISOString().split('T')[0];
                
                // In focus mode, only show top 5 from queue
                if (focusMode) {
                    return ALL_ITEMS
                        .filter(task => visibleQueue.slice(0, 5).includes(task.id))
                        .filter(task => {
                            const isCompletedToday = completions.some(
                                c => c.task_id === task.id && c.completion_date === today
                            );
                            return !isCompletedToday;
                        });
                }
                
                // Normal filtering - show ALL tasks, not filtered by queue
                return ALL_ITEMS.filter(task => {
                    const matchesSection = filterSection === 'all' || task.section === filterSection;
                    const matchesSearch = task.name.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchesPriority = preferences.priorityFilter === 'all' || 
                                          task.priority === preferences.priorityFilter ||
                                          task.section === 'Projects';
                    
                    const isCompletedToday = completions.some(
                        c => c.task_id === task.id && c.completion_date === today
                    );
                    
                    const matchesCompleted = preferences.showCompleted || !isCompletedToday;
                    
                    return matchesSection && matchesSearch && matchesPriority && matchesCompleted;
                });
            }, [filterSection, searchQuery, preferences, completions, focusMode]);

            const stats = useMemo(() => {
                const today = new Date().toISOString().split('T')[0];
                const completedToday = completions.filter(c => c.completion_date === today).length;

                const totalHoursCompleted = Object.values(dailyStats).reduce((acc, day) => {
                    return acc + (day.study_minutes || 0);
                }, 0) / 60;

                const { currentStreak, maxStreak } = calculateGlobalStreak(completions);

                return { 
                    completedToday, 
                    totalTasks: ALL_ITEMS.length, 
                    totalHoursCompleted: Math.floor(totalHoursCompleted), 
                    currentStreak, 
                    maxStreak 
                };
            }, [completions, dailyStats]);

            const lastBackupLabel = lastBackup ? new Date(lastBackup).toLocaleString() : 'never';

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900">
                        <div className="text-xl text-gray-600 dark:text-gray-400">Loading...</div>
                    </div>
                );
            }

            return (
                <div className={`min-h-screen bg-gradient-to-br from-blue-50 to-indigo-50 dark:from-gray-900 dark:to-gray-800 py-8 px-4 transition-colors duration-200 ${focusMode ? 'focus-mode-active' : ''}`}>
                    <div className="max-w-7xl mx-auto">
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            {/* Main Content */}
                            <div className="lg:col-span-2">
                                {/* Header */}
                                <div className="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-6 mb-6">
                                    <div className="flex items-center justify-between mb-4">
                                        <div>
                                            <h1 className="text-3xl font-bold text-gray-900 dark:text-gray-100">
                                                🎯 AI Study Tracker Pro
                                            </h1>
                                            <p className="text-gray-600 dark:text-gray-400 mt-1 flex items-center gap-3">
                                                {focusMode ? '🎯 Focus Mode Active' : 'Master AI Engineering • Track Progress • Build Momentum'}
                                                <span className="text-xs bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 px-2 py-0.5 rounded-full font-medium">
                                                    💾 Auto-save • {completions.length} tasks saved
                                                </span>
                                            </p>
                                        </div>
                                        <div className="flex gap-2">
                                            <button
                                                onClick={() => setShowShortcuts(true)}
                                                className="p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors text-xl"
                                                title="Keyboard shortcuts (?)"
                                            >
                                                ⌨️
                                            </button>
                                            <button
                                                onClick={handleExport}
                                                className="p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors text-xl hidden-in-focus"
                                                title="Export data (E)"
                                            >
                                                💾
                                            </button>
                                            <button
                                                onClick={handleImportClick}
                                                className="p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors text-xl hidden-in-focus"
                                                title="Import data (I)"
                                            >
                                                📥
                                            </button>
                                            <input
                                                ref={fileInputRef}
                                                type="file"
                                                accept="application/json"
                                                className="hidden"
                                                onChange={handleFileImport}
                                            />
                                            <button
                                                onClick={toggleDarkMode}
                                                className="p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors text-2xl"
                                                title="Toggle dark mode (D)"
                                            >
                                                {darkMode ? '☀️' : '🌙'}
                                            </button>
                                        </div>
                                    </div>

                                    {/* Global Streaks */}
                                    <div className="flex gap-4 mb-4">
                                        <div className="flex items-center gap-2 bg-orange-50 dark:bg-orange-900/20 px-4 py-2 rounded-lg flex-1">
                                            <span className={stats.currentStreak > 0 ? 'streak-flame text-2xl' : 'text-2xl'}>🔥</span>
                                            <div>
                                                <div className="text-2xl font-bold text-orange-600 dark:text-orange-400">{stats.currentStreak}</div>
                                                <div className="text-xs text-gray-600 dark:text-gray-400">Day Streak</div>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-2 bg-purple-50 dark:bg-purple-900/20 px-4 py-2 rounded-lg flex-1">
                                            <span className="text-2xl">🏆</span>
                                            <div>
                                                <div className="text-2xl font-bold text-purple-600 dark:text-purple-400">{stats.maxStreak}</div>
                                                <div className="text-xs text-gray-600 dark:text-gray-400">Best Streak</div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Stats */}
                                    <div className="grid grid-cols-3 gap-4">
                                        <div className="bg-green-50 dark:bg-green-900/20 rounded p-3 text-center">
                                            <div className="text-2xl font-bold text-green-600 dark:text-green-400">{stats.completedToday}</div>
                                            <div className="text-xs text-gray-600 dark:text-gray-400">Today</div>
                                        </div>
                                        <div className="bg-blue-50 dark:bg-blue-900/20 rounded p-3 text-center">
                                            <div className="text-2xl font-bold text-blue-600 dark:text-blue-400">{ALL_ITEMS.length}</div>
                                            <div className="text-xs text-gray-600 dark:text-gray-400">Total Topics</div>
                                        </div>
                                        <div className="bg-indigo-50 dark:bg-indigo-900/20 rounded p-3 text-center">
                                            <div className="text-2xl font-bold text-indigo-600 dark:text-indigo-400">{stats.totalHoursCompleted}h</div>
                                            <div className="text-xs text-gray-600 dark:text-gray-400">Studied</div>
                                        </div>
                                    </div>
                                </div>

                                {/* Filters & Controls */}
                                {!focusMode && (
                                    <div className="bg-white dark:bg-gray-800 rounded-lg shadow p-4 mb-6">
                                        <div className="flex flex-col gap-3">
                                            <div className="flex flex-col sm:flex-row gap-3">
                                                <select
                                                    value={filterSection}
                                                    onChange={(e) => setFilterSection(e.target.value)}
                                                    className="flex-1 px-4 py-2 border dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100"
                                                >
                                                    {sections.map(section => (
                                                        <option key={section} value={section}>
                                                            {section === 'all' ? '📚 All Sections' : section}
                                                        </option>
                                                    ))}
                                                </select>
                                                <input
                                                    ref={searchInputRef}
                                                    type="text"
                                                    placeholder="Search topics... (press /)"
                                                    value={searchQuery}
                                                    onChange={(e) => setSearchQuery(e.target.value)}
                                                    className="flex-1 px-4 py-2 border dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500"
                                                />
                                            </div>
                                            
                                            <div className="flex flex-wrap gap-2 items-center">
                                                <select
                                                    value={preferences.priorityFilter}
                                                    onChange={(e) => updatePreferences({ priorityFilter: e.target.value })}
                                                    className="px-3 py-1.5 text-sm border dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100"
                                                >
                                                    <option value="all">All Priorities</option>
                                                    <option value="high">High Priority</option>
                                                    <option value="medium">Medium Priority</option>
                                                    <option value="low">Low Priority</option>
                                                </select>
                                                
                                                <label className="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
                                                    <input
                                                        type="checkbox"
                                                        checked={preferences.showCompleted}
                                                        onChange={(e) => updatePreferences({ showCompleted: e.target.checked })}
                                                        className="rounded"
                                                    />
                                                    Show completed
                                                </label>
                                                
                                                <button
                                                    onClick={() => setFocusMode(!focusMode)}
                                                    className={`ml-auto px-3 py-1.5 text-sm rounded-lg ${
                                                        focusMode 
                                                            ? 'bg-purple-500 text-white' 
                                                            : 'bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300'
                                                    }`}
                                                    title="Focus Mode (F)"
                                                >
                                                    {focusMode ? '👁️ Focus ON' : '👁️ Focus OFF'}
                                                </button>
                                            </div>
                                        </div>
                                        
                                        <div className="mt-2 text-sm text-gray-600 dark:text-gray-400">
                                            {focusMode ? 'Showing top 5 priority tasks' : `Showing ${filteredTasks.length} of ${ALL_ITEMS.length} topics`}
                                        </div>
                                    </div>
                                )}

                                {/* Task List */}
                                <div className="space-y-2">
                                    {filteredTasks.map(task => (
                                        <TaskCard
                                            key={task.id}
                                            task={task}
                                            completions={completions}
                                            onToggle={handleToggle}
                                            onAddNote={handleAddNote}
                                            notes={notes}
                                            onTimerComplete={handleTimerComplete}
                                            showTimer={!focusMode}
                                        />
                                    ))}
                                </div>

                                {filteredTasks.length === 0 && (
                                    <div className="bg-white dark:bg-gray-800 rounded-lg shadow p-8 text-center text-gray-500 dark:text-gray-400">
                                        {focusMode ? '🎉 All focus tasks completed!' : 'No items in queue 🔍'}
                                    </div>
                                )}
                            </div>

                            {/* Sidebar */}
                            <div className={`lg:col-span-1 ${focusMode ? 'hidden-in-focus' : ''}`}>
                                <div className="sticky top-8 space-y-4">
                                    <AdaptiveGoalsWidget 
                                        completions={completions}
                                        goals={goals}
                                        onUpdateGoals={handleUpdateGoals}
                                        dailyStats={dailyStats}
                                    />
                                    <AnalyticsPanel 
                                        completions={completions} 
                                        dailyStats={dailyStats}
                                        onSectionClick={handleSectionClick}
                                    />
                                    <ContributionHeatmap completions={completions} dailyStats={dailyStats} darkMode={darkMode} />
                                </div>
                            </div>
                        </div>
                    </div>

                    <ShortcutsHelp show={showShortcuts} onClose={() => setShowShortcuts(false)} />
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
